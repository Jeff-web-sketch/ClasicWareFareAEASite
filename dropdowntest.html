<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dropdown with Button</title>
  <style>
    .dropdown {
      position: relative;
      display: inline-block;
    }

    .dropbtn {
      background-color: #007bff;
      color: white;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #f9f9f9;
      min-width: 160px;
      box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
      z-index: 1;
      border-radius: 4px;
    }

    .dropdown-content button {
      display: block;
      background: none;
      border: none;
      padding: 10px 16px;
      width: 100%;
      text-align: left;
      cursor: pointer;
    }

    .dropdown-content button:hover {
      background-color: #e9ecef;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }
  </style>
</head>

</body>
</html>
